name: CI/CD - Docker Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DOCKER_PROJECT_NAME: docker
  APP_CONTAINER_NAME: docker-backend-1
  DB_CONTAINER_NAME: docker-db-1

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Sonar Scanner
        run: |
          whoami
          pwd
          ls -l /opt/sonar-scanner/bin
          /opt/sonar-scanner/bin/sonar-scanner --version

      - name: Debug Sonar Credentials
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_TOKEN" ]; then
            echo "WARNING: SONAR_TOKEN is completely empty! Please check your GitHub repository secrets."
          else
            echo "SONAR_TOKEN is injected."
            echo "Length: ${#SONAR_TOKEN} characters"
            echo "Prefix: ${SONAR_TOKEN:0:4}..."
          fi

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          /opt/sonar-scanner/bin/sonar-scanner \
            -X \
            -Dsonar.organization=jhordyvela \
            -Dsonar.projectKey=jhordyvela_docker-jhordy \
            -Dsonar.sources=. \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=$SONAR_TOKEN

      - name: Stop containers
        run: |
          cd docker
          docker compose down -v --remove-orphans

      - name: Build and start
        run: |
          cd docker
          docker compose up -d --build

      - name: Wait DB
        run: sleep 30

      - name: Init DB
        run: |
          docker exec -i $DB_CONTAINER_NAME psql -U postgres -d postgres < $GITHUB_WORKSPACE/sql/init.sql

      - name: Show status
        run: |
          docker ps
          docker logs --tail 50 $APP_CONTAINER_NAME
