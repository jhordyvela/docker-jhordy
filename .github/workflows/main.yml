name: CI/CD - Docker Deploy

on:
push:
branches:
- master
workflow_dispatch:

env:
DOCKER_PROJECT_NAME: docker
APP_CONTAINER_NAME: docker-backend-1
DB_CONTAINER_NAME: docker-db-1

jobs:
build-and-deploy:
runs-on: self-hosted

```
steps:
  # 1. Descargar código
  - name: Checkout repository
    uses: actions/checkout@v4

  # 2. Verificar Sonar Scanner
  - name: Verify Sonar Scanner
    run: |
      whoami
      pwd
      ls -l /opt/sonar-scanner/bin
      /opt/sonar-scanner/bin/sonar-scanner --version

  # 3. Análisis SonarCloud
  - name: SonarCloud Analysis
    run: |
      /opt/sonar-scanner/bin/sonar-scanner \
        -Dsonar.organization=github-jhordyvela \
        -Dsonar.projectKey=docker-jhordy \
        -Dsonar.sources=. \
        -Dsonar.host.url=https://sonarcloud.io \
        -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  # 4. Detener contenedores existentes
  - name: Stop containers
    run: |
      cd docker
      docker compose down -v --remove-orphans

  # 5. Construir y levantar contenedores
  - name: Build and start
    run: |
      cd docker
      docker compose up -d --build

  # 6. Esperar a PostgreSQL
  - name: Wait DB
    run: sleep 30

  # 7. Inicializar base de datos
  - name: Init DB
    run: |
      docker exec -i $DB_CONTAINER_NAME \
        psql -U postgres -d postgres \
        < $GITHUB_WORKSPACE/sql/init.sql

  # 8. Mostrar estado
  - name: Show status
    run: |
      docker ps
      docker logs --tail 50 $APP_CONTAINER_NAME
```
