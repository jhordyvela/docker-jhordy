name: CI/CD - Docker Deploy

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  DOCKER_PROJECT_NAME: 'ecombackend'
  APP_CONTAINER_NAME: 'ecombackend-backend-1'
  DB_CONTAINER_NAME: 'ecombackend-db-1'
  DB_NAME: 'ecommerce_backend_prod'

jobs:

  build-and-deploy:
    name: Docker Build and Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stop old containers
        shell: cmd
        run: |
          cd docker
          docker-compose -p %DOCKER_PROJECT_NAME% down -v --remove-orphans

      - name: Build and start containers
        shell: cmd
        run: |
          cd docker
          docker-compose -p %DOCKER_PROJECT_NAME% up -d --build

      - name: Wait DB
        shell: powershell
        run: Start-Sleep -Seconds 30

      - name: Init DB (PostgreSQL)
        shell: cmd
        run: |
          type ..\sql\init.sql | docker exec -i %DB_CONTAINER_NAME% psql -U postgres %DB_NAME%

      - name: Show status
        shell: cmd
        run: |
          docker ps
          docker logs --tail 50 %APP_CONTAINER_NAME%
