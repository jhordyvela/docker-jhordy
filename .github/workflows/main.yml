name: CI/CD - Docker Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DOCKER_PROJECT_NAME: docker
  APP_CONTAINER_NAME: docker-backend-1
  DB_CONTAINER_NAME: docker-db-1

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Sonar Scanner
        run: |
          whoami
          pwd
          ls -l /opt/sonar-scanner/bin
          /opt/sonar-scanner/bin/sonar-scanner --version

      - name: Wait for SonarQube to be ready
        run: |
          echo "Waiting for SonarQube to start up..."
          for i in {1..30}; do
            STATUS=$(curl -s --max-time 5 http://localhost:9000/api/system/status || true)
            echo "Current status response: $STATUS"
            if echo "$STATUS" | grep -q '"status":"UP"'; then
              echo "SonarQube is fully up and running!"
              exit 0
            fi
            echo "SonarQube is not ready yet. Sleeping 10s ($i/30)..."
            sleep 10
          done
          echo "Error: SonarQube did not start in time."
          exit 1

      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          /opt/sonar-scanner/bin/sonar-scanner \
            -Dsonar.host.url=${SONAR_HOST_URL:-http://localhost:9000} \
            -Dsonar.token=$SONAR_TOKEN

      - name: Stop containers
        run: |
          cd docker
          docker compose down -v --remove-orphans

      - name: Build and start
        run: |
          cd docker
          docker compose up -d --build

      - name: Wait DB
        run: sleep 30

      - name: Init DB
        run: |
          docker exec -i $DB_CONTAINER_NAME psql -U postgres -d postgres < $GITHUB_WORKSPACE/sql/init.sql

      - name: Show status
        run: |
          docker ps
          docker logs --tail 50 $APP_CONTAINER_NAME
