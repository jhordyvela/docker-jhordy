name: CI/CD - Docker Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  DOCKER_PROJECT_NAME: docker
  APP_CONTAINER_NAME: docker-backend-1
  DB_CONTAINER_NAME: docker-db-1

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Verificar Sonar Scanner
      - name: Verify Sonar Scanner
        run: |
          whoami
          pwd
          sonar-scanner --version

      # 3. Esperar SonarQube (LOCAL EC2)
      - name: Wait for SonarQube
        run: |
          echo "Waiting for SonarQube..."
          for i in {1..60}; do
            STATUS=$(curl -s http://localhost:9000/api/system/status || true)
            echo "Status: $STATUS"

            if echo "$STATUS" | grep -q '"status":"UP"'; then
              echo "SonarQube is UP"
              exit 0
            fi

            sleep 10
          done

          echo "SonarQube not ready"
          exit 1

      # 4. SonarQube Analysis (CORREGIDO)
      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=docker-jhordy \
            -Dsonar.sources=. \
            -Dsonar.host.url=http://localhost:9000 \
            -Dsonar.token=$SONAR_TOKEN

      # 5. Stop containers
      - name: Stop containers
        run: |
          cd docker
          docker compose down -v --remove-orphans

      # 6. Build and start
      - name: Build and start
        run: |
          cd docker
          docker compose up -d --build

      # 7. Wait DB
      - name: Wait DB
        run: sleep 30

      # 8. Init DB
      - name: Init DB
        run: |
          docker exec -i $DB_CONTAINER_NAME \
          psql -U postgres -d postgres < $GITHUB_WORKSPACE/sql/init.sql

      # 9. Show status
      - name: Show status
        run: |
          docker ps
          docker logs --tail 50 $APP_CONTAINER_NAME