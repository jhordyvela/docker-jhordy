name: CI/CD - Docker Deploy

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  DOCKER_PROJECT_NAME: 'ecombackend'
  APP_CONTAINER_NAME: 'ecombackend-backend-1'
  DB_CONTAINER_NAME: 'ecombackend-db-1'
  DB_NAME: 'ecommerce_backend_prod'

jobs:

  build-and-deploy:
    runs-on: self-hosted

    steps:

      # 1. Código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. SONAR (OK)
      - name: SonarQube Analysis
        shell: cmd
        run: |
          C:\sonar-scanner\bin\sonar-scanner.bat ^
          -Dsonar.projectKey=ecommerce_git_action ^
          -Dsonar.sources=. ^
          -Dsonar.host.url=http://localhost:9000 ^
          -Dsonar.login=${{ secrets.SONAR_TOKEN }} ^
          -Dsonar.sourceEncoding=UTF-8

      # 3. Stop containers
      - name: Stop containers
        shell: cmd
        run: |
          cd docker
          docker-compose -p %DOCKER_PROJECT_NAME% down -v --remove-orphans

      # 4. Build + start
      - name: Build and start
        shell: cmd
        run: |
          cd docker
          docker-compose -p %DOCKER_PROJECT_NAME% up -d --build

      # 5. Esperar DB
      - name: Wait DB
        shell: powershell
        run: Start-Sleep -Seconds 30

      # 6. INIT DB (FIX REAL)
      - name: Init DB
        shell: cmd
        run: |
          docker exec -i %DB_CONTAINER_NAME% psql -U postgres -d postgres < "%GITHUB_WORKSPACE%\sql\init.sql"

      # 7. Estado final
      - name: Show status
        shell: cmd
        run: |
          docker ps
          docker logs --tail 50 %APP_CONTAINER_NAME%
