name: CI/CD - Docker Deploy

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  DOCKER_PROJECT_NAME: 'ecombackend'
  APP_CONTAINER_NAME: 'ecombackend-backend-1'
  DB_CONTAINER_NAME: 'ecombackend-db-1'
  DB_NAME: 'ecommerce_backend_prod'

jobs:

  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔥 SOLO SONAR (sin Maven)
      - name: SonarQube Analysis
        shell: cmd
        run: |
          sonar-scanner ^
          -Dsonar.projectKey=ecommerce_git_action ^
          -Dsonar.sources=. ^
          -Dsonar.host.url=http://localhost:9000 ^
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # Docker deploy
      - name: Stop containers
        shell: cmd
        run: |
          cd docker
          docker-compose -p %DOCKER_PROJECT_NAME% down -v --remove-orphans

      - name: Build and start
        shell: cmd
        run: |
          cd docker
          docker-compose -p %DOCKER_PROJECT_NAME% up -d --build

      - name: Wait DB
        shell: powershell
        run: Start-Sleep -Seconds 30

      - name: Init DB
        shell: cmd
        run: |
          type sql\init.sql | docker exec -i %DB_CONTAINER_NAME% psql -U postgres -d postgres

      - name: Show status
        shell: cmd
        run: |
          docker ps
