name: CI/CD - Docker Deploy

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  DOCKER_PROJECT_NAME: "ecombackend"
  APP_CONTAINER_NAME: "ecombackend-backend-1"
  DB_CONTAINER_NAME: "ecombackend-db-1"

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # SONARCLOUD
      - name: SonarCloud Analysis
        run: |
          sonar-scanner \
          -Dsonar.projectKey=ecommerce_git_action \
          -Dsonar.organization=TU_ORG \
          -Dsonar.sources=. \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # STOP CONTAINERS
      - name: Stop containers
        run: |
          cd docker
          docker-compose -p $DOCKER_PROJECT_NAME down -v --remove-orphans

      # BUILD + START
      - name: Build and start
        run: |
          cd docker
          docker-compose -p $DOCKER_PROJECT_NAME up -d --build

      # WAIT DB
      - name: Wait DB
        run: sleep 30

      # INIT DB
      - name: Init DB
        run: |
          cat $GITHUB_WORKSPACE/sql/init.sql | docker exec -i $DB_CONTAINER_NAME psql -U postgres -d postgres

      # STATUS
      - name: Show status
        run: |
          docker ps
          docker logs --tail 50 $APP_CONTAINER_NAME
