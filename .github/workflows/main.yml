name: CI/CD - Node + SonarQube + Docker

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  APP_CONTAINER_NAME: node-app
  DB_CONTAINER_NAME: node-db
  SONAR_HOST_URL: http://localhost:9000

jobs:

  sonar-analysis:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          echo "TOKEN LENGTH: ${#SONAR_TOKEN}"

          if [ -z "$SONAR_TOKEN" ]; then
            echo "ERROR: SONAR_TOKEN is empty"
            exit 1
          fi

          /opt/sonar-scanner/bin/sonar-scanner \
            -Dsonar.projectKey=node-project \
            -Dsonar.projectName=node-project \
            -Dsonar.sources=. \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_TOKEN

  build-and-deploy:
    runs-on: self-hosted
    needs: sonar-analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop old containers
        run: |
          docker compose down -v || true

      - name: Build and start containers
        run: |
          docker compose up -d --build

      - name: Show running containers
        run: docker ps

      - name: Show backend logs
        run: docker logs --tail 50 $APP_CONTAINER_NAME || true