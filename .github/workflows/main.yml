# .github/workflows/main.yml
# Pipeline CI/CD: SonarQube Analysis + Docker Deploy (Self-Hosted Runner)

name: CI/CD - SonarQube + Docker Deploy

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  DOCKER_PROJECT_NAME: 'ecombackend'
  APP_CONTAINER_NAME: 'product_app'
  DB_CONTAINER_NAME: 'mysql-ecommerce-prod'
  DB_NAME: 'ecommerce_backend_prod'
  DB_USER: 'root'
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:

  # JOB 1: Analisis SonarQube (primero)
  sonar-analysis:
    name: SonarQube Analysis and Quality Gate
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build proyecto sin tests
        run: mvn -B clean package -DskipTests

      - name: SonarQube Analysis
        timeout-minutes: 10
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:3.9.0.2155:sonar "-Dsonar.projectKey=ecommerce_git_action" "-Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}" "-Dsonar.login=${{ secrets.SONAR_TOKEN }}" "-Dsonar.working.directory=.sonarwork"

      - name: Verificar report-task generado
        shell: powershell
        run: |
          Write-Host "=== Buscando report-task.txt ==="
          Get-ChildItem -Recurse -Filter "report-task.txt" -ErrorAction SilentlyContinue | Select-Object FullName
          Write-Host "=== Contenido del directorio .sonarwork ==="
          if (Test-Path ".sonarwork") {
            Get-ChildItem ".sonarwork" -Recurse | Select-Object FullName
          } else {
            Write-Host ".sonarwork no existe"
          }
          Write-Host "=== Directorios en raiz ==="
          Get-ChildItem -Directory | Select-Object Name

      
  # JOB 2: Build + Docker Deploy (solo si Sonar pasa)
  build-and-deploy:
    name: Build and Docker Deploy
    runs-on: self-hosted
    needs: sonar-analysis
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: mvn -B clean package -DskipTests

      - name: Deploy with Docker Compose
        shell: cmd
        run: |
          echo Iniciando despliegue en el runner local...
          cd docker
          echo Limpiando despliegue anterior...
          docker-compose -p %DOCKER_PROJECT_NAME% down -v --remove-orphans
          echo Construyendo y levantando los servicios...
          docker-compose -p %DOCKER_PROJECT_NAME% up -d --build
          echo Esperando 30 segundos para que la DB se estabilice...
          timeout /t 30 /nobreak
          echo Inicializando base de datos desde init.sql...
          type ..\sql\init.sql | docker exec -i %DB_CONTAINER_NAME% mysql -u%DB_USER% -p%DB_PASSWORD% %DB_NAME%
          echo Verificando estado de los contenedores...
          docker-compose -p %DOCKER_PROJECT_NAME% ps
          echo Mostrando los ultimos logs de la aplicacion:
          docker logs --tail 100 %APP_CONTAINER_NAME%
          echo Despliegue local completado exitosamente.
